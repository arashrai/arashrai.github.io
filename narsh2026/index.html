<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Narsh 2026">
    <title>Narsh 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/narsh2026/styles.css">
  </head>
  <body>
    <div id="gate">
      <div class="gate-page">
        <div class="gate-hero">
          <img class="hero-photo" src="/narsh2026/images/couple-placeholder.svg" alt="Natalie and Arash">
          <h1>Natalie & Arash</h1>
          <p class="tagline">You're invited to the party.</p>
        </div>
        <form id="password-form" class="gate-form">
          <input id="password-input" type="password" placeholder="Enter your password" autocomplete="off" required>
          <button id="password-submit" type="submit">Let's go</button>
        </form>
        <p id="gate-status" class="gate-status" aria-live="polite"></p>
      </div>
    </div>

    <div id="welcome" class="hidden">
      <header class="site-header">
        <a href="/narsh2026/" class="site-logo">Narsh 2026</a>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
          <span class="nav-toggle-icon"></span>
        </button>
        <nav class="site-nav" id="site-nav">
          <a href="/narsh2026/our-story/">Our Story</a>
          <a href="/narsh2026/our-people/">Our People</a>
          <a href="/narsh2026/puzzles/">Puzzles</a>
          <a href="/narsh2026/schedule/">Schedule</a>
          <a href="/narsh2026/venue-travel/">Venue & Travel</a>
          <a href="/narsh2026/dress-code/">Dress Code</a>
        </nav>
      </header>
      <main class="page-content">
        <h1>Welcome!</h1>
        <p>We're so glad you're here. Explore our story, meet our people, and get all the details for the big day.</p>
      </main>
    </div>

    <script src="/narsh2026/auth.js"></script>
    <script>
      const gateEl = document.getElementById("gate");
      const welcomeEl = document.getElementById("welcome");
      const formEl = document.getElementById("password-form");
      const inputEl = document.getElementById("password-input");
      const statusEl = document.getElementById("gate-status");
      const submitEl = document.getElementById("password-submit");

      const tier = NARSH_AUTH.getTier();
      if (tier) {
        gateEl.classList.add("hidden");
        welcomeEl.classList.remove("hidden");
        NARSH_AUTH.applyTierVisibility(tier);
      }

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusEl.textContent = "";
        submitEl.disabled = true;

        const password = inputEl.value.trim();
        if (!password) {
          statusEl.textContent = "Please enter a password.";
          submitEl.disabled = false;
          return;
        }

        const result = await NARSH_AUTH.checkPassword(password);
        if (!result) {
          statusEl.textContent = "Hmm, that's not it -- check your invitation!";
          submitEl.disabled = false;
          return;
        }

        gateEl.classList.add("hidden");
        welcomeEl.classList.remove("hidden");
        NARSH_AUTH.applyTierVisibility(result);
      });
    </script>
  </body>
</html>
