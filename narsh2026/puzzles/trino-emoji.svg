<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Clip for split face -->
  <defs>
    <clipPath id="head-clip"><ellipse cx="32" cy="36" rx="24" ry="22"/></clipPath>
  </defs>
  <!-- Ears -->
  <path d="M10 24 L14 4 L24 20 Z" fill="#CC7A3E"/>
  <path d="M40 20 L50 4 L54 24 Z" fill="#2A2216"/>
  <path d="M13 22 L14.5 8 L22 19 Z" fill="#D4A0A0"/>
  <path d="M42 19 L49.5 8 L51 22 Z" fill="#D4A0A0"/>
  <!-- Head — dark base -->
  <ellipse cx="32" cy="36" rx="24" ry="22" fill="#2A2216"/>
  <!-- Orange left half -->
  <rect x="8" y="14" width="24" height="44" fill="#CC7A3E" clip-path="url(#head-clip)"/>
  <!-- Tortie patches -->
  <circle cx="20" cy="38" r="4" fill="#5C3A1E" opacity="0.4" clip-path="url(#head-clip)"/>
  <circle cx="42" cy="40" r="3" fill="#8B5E3C" opacity="0.3" clip-path="url(#head-clip)"/>
  <!-- White muzzle -->
  <ellipse cx="32" cy="44" rx="13" ry="10" fill="#FFFDFB"/>
  <!-- Left eye -->
  <circle cx="22" cy="32" r="4.5" fill="#FFFDFB"/>
  <circle cx="22" cy="33" r="2.8" fill="#7D9A3E"/>
  <circle cx="22" cy="33.5" r="1.5" fill="#222"/>
  <circle cx="23.2" cy="31.5" r="1" fill="#FFFDFB"/>
  <!-- Right eye -->
  <circle cx="42" cy="32" r="4.5" fill="#FFFDFB"/>
  <circle cx="42" cy="33" r="2.8" fill="#7D9A3E"/>
  <circle cx="42" cy="33.5" r="1.5" fill="#222"/>
  <circle cx="43.2" cy="31.5" r="1" fill="#FFFDFB"/>
  <!-- Black nose -->
  <path d="M32 40 L29 43.5 L35 43.5 Z" fill="#222" stroke="#111" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M29 44.5 Q30.5 47 32 44.5 Q33.5 47 35 44.5" stroke="#888" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="18" y1="42" x2="4" y2="39" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="45" x2="4" y2="47" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="46" y1="42" x2="60" y2="39" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="46" y1="45" x2="60" y2="47" stroke="#888" stroke-width="1" stroke-linecap="round"/>
</svg>
